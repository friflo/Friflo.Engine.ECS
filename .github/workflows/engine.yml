name: CI-Engine

on:
  push:
    branches: '*'
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      working-directory: ./
      run: dotnet restore

    - name: Build
      working-directory: ./
      run: dotnet build --no-restore

    - name: Test
      working-directory: ./
      run: dotnet test --no-build --verbosity normal




    